aid: lunar
name: Lunar
description: >-
  Lunar is an enterprise-grade API management and AI control plane platform
  that provides a unified gateway for managing API traffic policies, rate
  limiting, quota enforcement, and API monetization across gateways. The
  platform combines an API consumption gateway with an MCP (Model Context
  Protocol) gateway to govern, secure, and observe interactions between AI
  agents, APIs, and data sources. Lunar delivers real-time visibility into
  model, API, and tool invocations alongside policy-based enforcement, cost
  controls, and advanced traffic shaping including retries, priority queues,
  and circuit breakers.
type: Index
image: >-
  https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
url: >-
  https://raw.githubusercontent.com/api-evangelist/lunar/refs/heads/main/apis.yml
