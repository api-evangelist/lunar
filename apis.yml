apis:
  - aid: lunar:api-consumption-gateway
    name: Lunar API Consumption Gateway
    description: >-
      The Lunar API Consumption Gateway is a proxy-based infrastructure layer
      that routes outbound HTTP/HTTPS API traffic through configurable YAML-based
      flows. It enforces rate limits, quota policies, priority queues, circuit
      breakers, and endpoint access controls without requiring code changes in
      consuming applications. Requests are routed by setting x-lunar-scheme,
      x-lunar-host, and x-lunar-consumer-tag headers and targeting the gateway
      on port 8000.
    humanURL: https://docs.lunar.dev/api-gateway/get-started/welcome-to-lunar/
    baseURL: https://app.lunar.dev
    tags:
      - API Gateway
      - Traffic Management
      - Rate Limiting
      - Quota Enforcement
    properties:
      - type: Documentation
        url: https://docs.lunar.dev/api-gateway/get-started/welcome-to-lunar/
      - type: GettingStarted
        url: >-
          https://docs.lunar.dev/api-gateway/installation-overview/quick-start/quick-start-with-terminal/
      - type: ControlPlane
        url: https://docs.lunar.dev/api-gateway/installation-overview/quick-start/quick-start-with-control-plane/
  - aid: lunar:mcpx-gateway
    name: Lunar MCPX Gateway
    description: >-
      The Lunar MCPX Gateway is an agent-native Model Context Protocol gateway
      that governs tool invocation for AI agents. It consolidates multiple MCP
      servers into a single endpoint, providing authentication, scoped
      permissions, secret forwarding, audit trails, and risk evaluation for
      AI agent workloads. The MCPX gateway supports role-based access control,
      tool groups, tool customization, and remote MCP authentication.
    humanURL: https://www.lunar.dev/product/ai-gateway
    baseURL: https://app.lunar.dev
    tags:
      - MCP Gateway
      - AI Governance
      - Agent Security
      - Tool Access Control
    properties:
      - type: Documentation
        url: https://docs.lunar.dev/
      - type: ProductPage
        url: https://www.lunar.dev/product/ai-gateway
